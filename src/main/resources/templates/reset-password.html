<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - AfyaCheck</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-gradient">

<div class="auth-container">
    <div class="auth-header">
        <div class="logo">AfyaCheck</div>
        <div class="tagline">Reset Your Password</div>
    </div>
    <!-- ✅ Success message -->
    <div th:if="${successMessage}" class="alert success" th:text="${successMessage}"></div>

    <!-- ❌ Error message -->
    <div th:if="${errorMessage}" class="alert error" th:text="${errorMessage}"></div>

    <div class="form-container">
        <form class="form" th:action="@{/reset-password}" method="post">
            <h2 class="form-title">Create New Password</h2>

            <!-- ✅ Show success -->
            <div th:if="${param.success}" class="alert success">
                ✅ Your password has been reset successfully! Please login.
            </div>

            <!-- ❌ Show error -->
            <div th:if="${param.error}" class="alert error">
                ❌ Something went wrong. Please try again.
            </div>

            <div class="input-group">
                <label for="newPassword">New Password</label>
                <input type="password" id="newPassword" name="password" required>
            </div>

            <div class="input-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" name="confirmPassword" required>
            </div>

            <button type="submit" class="btn btn-primary">Reset Password</button>

            <div class="form-toggle">
                Remembered? <a th:href="@{/login}">Go back to Login</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
