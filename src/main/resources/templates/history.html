<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assessment History</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-green: #28a745;
            --light-green: #d4edda;
            --dark-green: #1e7e34;
            --white: #ffffff;
        }

        body {
            background-color: var(--white);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .history-container {
            background: var(--white);
            border-radius: 15px;
            padding: 2.5rem;
            margin-top: 2rem;
            border: 2px solid var(--light-green);
        }

        .assessment-card {
            border-left: 4px solid var(--primary-green);
            margin-bottom: 1rem;
            border-radius: 8px;
        }

        .btn-primary {
            background-color: var(--primary-green);
            border-color: var(--primary-green);
            border-radius: 25px;
            padding: 0.75rem 2rem;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-10">
            <div class="history-container">
                <h2 class="text-success mb-4">Assessment History</h2>

                <div th:each="assessment : ${assessments}" class="card assessment-card">
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-8">
                                <h5 class="text-success">
                                    Risk Score: <span th:text="${assessment.riskScore} + '%'"></span>
                                </h5>
                                <p class="mb-1">
                                    <strong>Risk Level:</strong>
                                    <span th:text="${assessment.riskLevel}"></span>
                                </p>
                                <p class="mb-1">
                                    <strong>Date:</strong>
                                    <span th:text="${#dates.format(assessment.createdAt, 'MMMM dd, yyyy HH:mm')}"></span>
                                </p>
                            </div>
                            <div class="col-md-4 text-end">
                                    <span th:classappend="${assessment.riskLevel == 'Low'} ? 'badge bg-success' :
                                                          ${assessment.riskLevel == 'Medium'} ? 'badge bg-warning' : 'badge bg-danger'"
                                          th:text="${assessment.riskLevel}">
                                    </span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="text-center mt-4">
                    <a href="/questionnaire/start" class="btn btn-primary">New Assessment</a>
                    <a th:href="@{/results/view(sessionId=${session.sessionId})}" class="btn btn-outline-secondary">Current Results</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
