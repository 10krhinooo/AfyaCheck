<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>AfyaCheck - Register</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        /* Update color scheme only */
        .auth-header {
            background: linear-gradient(135deg, #00b894 0%, #0984e3 100%);
        }

        .logo {
            background: linear-gradient(45deg, #ffffff, #f8f9fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 2.2rem;
            font-weight: bold;
        }

        .password-toggle {
            color: #6c757d;
        }

        .password-toggle:hover {
            color: #00b894;
        }
    </style>
</head>
<body>
<div class="auth-container">
    <div class="auth-header">
        <div class="logo">AFYACHECK</div>
        <div class="tagline">Your Health, Our Priority</div>
    </div>

    <div class="form-container">
        <h2 class="form-title">Create an Account</h2>
        <!-- ✅ Success message -->
        <div th:if="${successMessage}" class="alert success" th:text="${successMessage}"></div>

        <!-- ❌ Error message -->
        <div th:if="${errorMessage}" class="alert error" th:text="${errorMessage}"></div>

        <form th:action="@{/register}" th:object="${user}" method="post" id="registerForm" class="form">
            <!-- Full Name -->
            <div class="input-group">
                <label for="name">Full Name</label>
                <div style="position: relative;">
                    <input type="text" th:field="*{name}" id="name" placeholder="Enter your full name" required>
                </div>
            </div>

            <!-- Username -->
            <div class="input-group">
                <label for="username">Username</label>
                <div style="position: relative;">
                    <input type="text" th:field="*{username}" id="username" placeholder="Choose a username" required>
                </div>
            </div>

            <!-- Email -->
            <div class="input-group">
                <label for="email">Email</label>
                <div style="position: relative;">
                    <input type="email" th:field="*{email}" id="email" placeholder="Enter your email" required>
                </div>
            </div>

            <!-- Password -->
            <div class="input-group">
                <label for="registerPassword">Password</label>
                <div style="position: relative;">
                    <input type="password" th:field="*{password}" id="registerPassword" placeholder="Enter your password" required>
                    <button type="button" class="password-toggle" onclick="togglePassword('registerPassword', this)">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>

            <!-- Password Requirements -->
            <div class="password-requirements">
                <h4>Password must contain:</h4>
                <div class="requirement" id="lengthReq">
                    <div class="requirement-icon">✓</div>
                    <span>At least 8 characters</span>
                </div>
                <div class="requirement" id="uppercaseReq">
                    <div class="requirement-icon">✓</div>
                    <span>One uppercase letter</span>
                </div>
                <div class="requirement" id="lowercaseReq">
                    <div class="requirement-icon">✓</div>
                    <span>One lowercase letter</span>
                </div>
                <div class="requirement" id="numberReq">
                    <div class="requirement-icon">✓</div>
                    <span>One number</span>
                </div>
                <div class="requirement" id="specialReq">
                    <div class="requirement-icon">✓</div>
                    <span>One special character</span>
                </div>
            </div>

            <!-- Password Strength -->
            <div class="password-strength">
                <div id="strengthBar" class="password-strength-bar"></div>
            </div>
            <div id="strengthText" class="password-strength-text">Password strength</div>

            <!-- Confirm Password -->
            <div class="input-group">
                <label for="confirmPassword">Confirm Password</label>
                <div style="position: relative;">
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Re-enter your password" required>
                    <button type="button" class="password-toggle" onclick="togglePassword('confirmPassword', this)">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>

            <!-- Terms -->
            <div class="checkbox-group">
                <input type="checkbox" id="agreeTerms" name="agreeTerms" required>
                <label for="agreeTerms">I agree to the Terms & Privacy Policy</label>
            </div>

            <!-- Submit -->
            <button type="submit" class="btn">Register</button>

            <div class="divider">
                <span>Or continue with</span>
            </div>

            <div class="social-login">
                <button type="button" class="social-btn google" onclick="loginWithGoogle()">
                    <div class="social-icon">
                        <svg viewBox="0 0 24 24" width="20" height="20" xmlns="http://www.w3.org/2000/svg">
                            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                        </svg>
                    </div>
                    <span>Google</span>
                </button>

                <button type="button" class="social-btn github" onclick="loginWithGitHub()">
                    <div class="social-icon">
                        <svg viewBox="0 0 24 24" width="20" height="20" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
                            <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                        </svg>
                    </div>
                    <span>GitHub</span>
                </button>
            </div>
        </form>

        <p class="form-toggle">
            Already have an account? <a th:href="@{/login}">Login here</a>
        </p>
    </div>
</div>

<script th:src="@{/js/script.js}"></script>
<script>
    function togglePassword(inputId, toggleBtn) {
        const passwordInput = document.getElementById(inputId);
        if (!passwordInput) return;

        const isPassword = passwordInput.type === 'password';
        passwordInput.type = isPassword ? 'text' : 'password';

        const icon = toggleBtn.querySelector('i');
        if (icon) {
            icon.className = isPassword ? 'bi bi-eye-slash' : 'bi bi-eye';
        }
    }

    function loginWithGoogle() {
        window.location.href = '/oauth2/authorization/google';
    }

    function loginWithGitHub() {
        window.location.href = '/oauth2/authorization/github';
    }

    document.addEventListener("DOMContentLoaded", function () {
        const alerts = document.querySelectorAll(".alert");
        alerts.forEach(alert => {
            setTimeout(() => {
                alert.classList.add("hide");
            }, 5000);
        });
    });
</script>
</body>
</html>
