<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - AfyaCheck</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .error-container {
            max-width: 600px;
            margin: 100px auto;
            padding: 2rem;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        .error-icon {
            font-size: 4rem;
            color: #dc3545;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="error-container">
        <div class="error-icon">⚠️</div>
        <h1 class="text-danger">System Error</h1>
        <p class="lead" th:text="${error}">An unexpected error occurred</p>
        <div class="mt-4">
            <a href="/questionnaire/start" class="btn btn-primary me-2">Try Again</a>
            <a href="/home" class="btn btn-outline-secondary">Go Home</a>
        </div>
        <div th:if="${sessionId}" class="mt-3">
            <small class="text-muted">Session ID: <code th:text="${sessionId}"></code></small>
        </div>
    </div>
</div>
</body>
</html>
