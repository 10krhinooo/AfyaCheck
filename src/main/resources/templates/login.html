<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AfyaCheck</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="auth-container">
    <div class="auth-header">
        <div class="logo">AfyaCheck</div>
        <div class="tagline">Your Digital Health Companion</div>
    </div>
    <!-- ✅ Success message -->
    <div th:if="${successMessage}" class="alert success" th:text="${successMessage}"></div>

    <!-- ❌ Error message -->
    <div th:if="${errorMessage}" class="alert error" th:text="${errorMessage}"></div>

    <div class="form-container">
        <!-- ✅ Add CSRF token -->
        <form class="form" id="loginForm" th:action="@{/login}" method="post">
<!--            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>-->

            <h2 class="form-title">Welcome Back</h2>

            <!-- ✅ Success messages -->
            <div th:if="${message}" class="alert success" th:text="${message}">
                ✅ Account created successfully! Check your email for verification.
            </div>

            <!-- ✅ Error message -->
            <div th:if="${error}" class="alert error" th:text="${error}">
                ❌ Invalid email or password. Please try again.
            </div>

            <div class="input-group">
                <label for="loginEmail">Email Address</label>
                <input type="email" id="loginEmail" name="username" required>
            </div>

            <div class="input-group">
                <label for="loginPassword">Password</label>
                <div style="position: relative;">
                    <input type="password" id="loginPassword" name="password" required>
                    <button type="button" class="password-toggle" onclick="togglePassword('loginPassword', this)">
                        👁️
                    </button>
                </div>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="rememberMe" name="remember-me">
                <label for="rememberMe">Remember me</label>
            </div>

            <button type="submit" class="btn">Sign In</button>

            <div class="forgot-password">
                <a th:href="@{/forgot-password}">Forgot your password?</a>
            </div>

            <div class="form-toggle">
                Don't have an account? <a th:href="@{/register}">Sign up</a>
            </div>
        </form>
    </div>
</div>

<script th:src="@{/js/script.js}"></script>
</body>
</html>
