<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - AfyaCheck</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="auth-container">
    <div class="auth-header">
        <div class="logo">AfyaCheck</div>
        <div class="tagline">Your Digital Health Companion</div>
    </div>

    <div class="form-container">
        <!-- ✅ FIXED: Added Thymeleaf action, method, and CSRF token -->
        <form class="form" id="forgotPasswordForm" th:action="@{/forgot-password}" method="post">
<!--            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>-->

            <h2 class="form-title">Reset Password</h2>

            <!-- ✅ Add success/error messages -->
            <div th:if="${message}" class="alert success" th:text="${message}">
                Password reset link sent! Check your email.
            </div>

            <div th:if="${error}" class="alert error" th:text="${error}">
                Error sending reset link. Please try again.
            </div>

            <div class="description">
                <p>Enter your email address and we'll send you a link to reset your password.</p>
            </div>

            <div class="input-group">
                <label for="forgotEmail">Email Address</label>
                <input type="email" id="forgotEmail" name="email" required
                       placeholder="Enter your registered email">
            </div>

            <button type="submit" class="btn">Send Reset Link</button>

            <!-- ✅ FIXED: Use Thymeleaf URLs -->
            <div class="form-toggle">
                Remember your password? <a th:href="@{/login}">Back to Sign In</a>
            </div>

            <div class="form-toggle" style="margin-top: 10px;">
                Don't have an account? <a th:href="@{/register}">Sign up</a>
            </div>
        </form>
    </div>
</div>

<script th:src="@{/js/script.js}"></script>
</body>
</html>
