spring.application.name=afyacheck
app.base-url=${APP_BASE_URL:http://localhost:8080}
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/AfyaCheck}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
server.port=8080

# ML Service Configuration
ml.service.url=http://localhost:8000
ml.service.health-check-endpoint=/health
ml.service.timeout=5000

# Decision Tree Service Configuration
decision.tree.service.url=http://localhost:8001
decision.tree.service.script.path=./python-service/decision_tree_service.py
decision.tree.service.auto.start=false

# Timeout settings
spring.mvc.async.request-timeout=30000
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# RestTemplate timeout
rest.template.timeout=10000
# Python executable path
python.executable.path=python

# ML service script path
ml.service.script.path=./ml-service/app.py

# Auto-start ML service (set to true if you want Spring Boot to start Python service)
ml.service.auto.start=false

## Spring Security default user (optional for quick test)
#spring.security.user.name=admin
#spring.security.user.password=admin

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:noreply.afyacheck@gmail.com}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.from=${MAIL_USERNAME:noreply.afyacheck@gmail.com}

server.servlet.session.timeout=30m
security.remember-me.key=${REMEMBER_ME_KEY:}
security.remember-me.token-validity-seconds=604800


logging.level.org.springframework.web=INFO
logging.level.com.afyacheck=DEBUG

# ============================================
# IMPORTANT: OAuth2 Configuration is DISABLED
# ============================================
# To enable OAuth2, uncomment and configure the sections below
# Make sure you have valid client IDs and secrets from the providers

# Google OAuth2 (DISABLED)
 spring.security.oauth2.client.registration.google.client-id=${GOOGLE_OAUTH_CLIENT_ID:}
 spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_OAUTH_CLIENT_SECRET:}
 spring.security.oauth2.client.registration.google.scope=profile,email
 spring.security.oauth2.client.registration.google.redirect-uri=${APP_BASE_URL:http://localhost:8080}/login/oauth2/code/google

# GitHub OAuth2 (DISABLED)
 spring.security.oauth2.client.registration.github.client-id=${GITHUB_OAUTH_CLIENT_ID:}
 spring.security.oauth2.client.registration.github.client-secret=${GITHUB_OAUTH_CLIENT_SECRET:}
 spring.security.oauth2.client.registration.github.scope=read:user,user:email
 spring.security.oauth2.client.registration.github.redirect-uri=${APP_BASE_URL:http://localhost:8080}/login/oauth2/code/github

# Apple OAuth2 (DISABLED)
# spring.security.oauth2.client.registration.apple.client-id=YOUR_APPLE_SERVICE_ID
# spring.security.oauth2.client.registration.apple.client-secret=YOUR_APPLE_CLIENT_SECRET
# spring.security.oauth2.client.registration.apple.scope=name,email
# spring.security.oauth2.client.registration.apple.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# Thymeleaf
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.servlet.content-type=text/html
spring.thymeleaf.cache=false


#maps
google.maps.api.key=${GOOGLE_MAPS_API_KEY:}


# Service Health Check Timeouts
service.connection.timeout=5000
service.read.timeout=10000

# Retry Configuration
service.retry.max-attempts=3
service.retry.delay=1000