spring.application.name=afyacheck
app.base-url=${APP_BASE_URL:http://localhost:8080}
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/AfyaCheck}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
server.port=8080

# ML Service Configuration
ml.service.url=http://localhost:8000
# MLService.java reads this exact key (distinct from ml.service.url above,
# which PythonConfig.java reads) -- kept in sync here so both classes agree
# even though they historically used different property names.
ml.risk.service.url=http://localhost:8000
ml.service.health-check-endpoint=/health
ml.service.timeout=5000

# Decision Tree Service Configuration
decision.tree.service.url=http://localhost:8001
decision.tree.service.script.path=./python-service/decision_tree_service.py
decision.tree.service.auto.start=true

# Timeout settings
spring.mvc.async.request-timeout=30000
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# RestTemplate timeout
rest.template.timeout=10000
# Python executable path -- pinned to an absolute path rather than the bare
# "python" on PATH, since PATH can resolve to an unrelated venv (missing
# fastapi/catboost/etc.) depending on what shell launches this app.
python.executable.path=C:/Python314/python.exe

# ML service script path
ml.service.script.path=./ml-service/app.py

# Auto-start ML service (Spring Boot starts ml-service/app.py as a subprocess
# on port 8000 -- see PythonServiceManager)
ml.service.auto.start=true

## Spring Security default user (optional for quick test)
#spring.security.user.name=admin
#spring.security.user.password=admin

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:noreply.afyacheck@gmail.com}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.from=${MAIL_USERNAME:noreply.afyacheck@gmail.com}

server.servlet.session.timeout=30m


logging.level.org.springframework.security=INFO
logging.level.org.springframework.web=INFO
logging.level.com.afyacheck=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# ============================================
# Keycloak (OIDC resource server)
# ============================================
# Identity is owned by Keycloak — the React SPA authenticates directly against it via
# Authorization Code + PKCE, and Spring Boot only validates the resulting JWTs. See
# keycloak/realm-export.json for the "afyacheck" realm (client "afyacheck-spa", roles
# ROLE_ADMIN/ROLE_USER, Google/GitHub identity brokering) and docker-compose.yml for a local
# dev instance.
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/afyacheck}

# Thymeleaf
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.servlet.content-type=text/html
spring.thymeleaf.cache=false


#maps
google.maps.api.key=${GOOGLE_MAPS_API_KEY:}


# Service Health Check Timeouts
service.connection.timeout=5000
service.read.timeout=10000

# Retry Configuration
service.retry.max-attempts=3
service.retry.delay=1000