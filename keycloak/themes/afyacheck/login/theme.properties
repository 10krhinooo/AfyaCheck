# Extends Keycloak's built-in v2 theme (login/register/forgot-password/verify-email screens)
# rather than rewriting the FreeMarker templates from scratch — just layers AfyaCheck's
# palette, type, and card styling on top via afyacheck.css. See ../../../src/index.css in the
# frontend for the source-of-truth color/font tokens this mirrors.
parent=keycloak.v2
import=common/keycloak
styles=css/afyacheck.css

# Where the "AfyaCheck" wordmark in the split-screen brand panel/bar links to (see
# .ac-split__logo in template.ftl). Keycloak runs on its own origin from the app, so this can't
# be derived from realm/client config — override per environment. Matches this repo's local dev
# docker-compose, where the backend serves the marketing home page on :8080.
appHomeUrl=http://localhost:8080/
