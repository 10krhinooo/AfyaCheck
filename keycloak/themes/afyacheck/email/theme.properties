# Extends Keycloak's built-in email theme (verify-email, password-reset, execute-actions,
# email-update-confirmation, etc. all share one HTML wrapper — see html/template.ftl) rather
# than rewriting each message template. Email clients strip <link>/external CSS and often
# custom @font-face, so unlike the login theme this uses web-safe font stacks and inline
# styles instead of afyacheck.css.
parent=keycloak

# Same purpose as login/theme.properties' appHomeUrl: the "AfyaCheck" wordmark in the email
# header links back to the app. Keycloak has no realm/client config for this, so it's set
# per environment here too.
appHomeUrl=http://localhost:8080/
