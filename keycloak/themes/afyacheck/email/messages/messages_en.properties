# Overrides only the subject/body copy that benefits from naming AfyaCheck explicitly —
# everything else (other locales, less common message keys) falls through to the parent
# "keycloak"/"base" email theme unchanged. Bodies keep the parent's {0}/{1}/... placeholder
# order (link, newEmail, realmName, linkExpiration, ...) since html/email-verification.ftl etc.
# call msg(...) positionally and aren't overridden here.
emailVerificationSubject=Verify your AfyaCheck email address
emailVerificationBodyHtml=<p>Someone created an AfyaCheck account with this email address. If this was you, click below to verify it.</p><p><a href="{0}">Verify email address</a></p><p>This link expires in {3}.</p><p>If you didn''t create this account, you can safely ignore this message.</p>

passwordResetSubject=Reset your AfyaCheck password
passwordResetBodyHtml=<p>Someone requested a password reset for your AfyaCheck account. If this was you, click below to choose a new password.</p><p><a href="{0}">Reset password</a></p><p>This link expires in {3}.</p><p>If you didn''t request this, you can safely ignore this message &mdash; your password won&rsquo;t be changed.</p>

emailUpdateConfirmationSubject=Confirm your new AfyaCheck email address
emailUpdateConfirmationBodyHtml=<p>To update your AfyaCheck account to use {1} as your email address, click below.</p><p><a href="{0}">Confirm new email address</a></p><p>This link expires in {3}.</p><p>If you didn''t request this change, you can safely ignore this message.</p>

executeActionsSubject=Action required for your AfyaCheck account
executeActionsBodyHtml=<p>An administrator has requested that you update your AfyaCheck account by completing the following: {3}.</p><p><a href="{0}">Continue</a></p><p>This link expires in {4}.</p><p>If you weren''t expecting this, you can safely ignore this message.</p>

emailTestSubject=AfyaCheck SMTP test message
emailTestBodyHtml=<p>This is a test message confirming AfyaCheck&rsquo;s email delivery is working.</p>
