name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: afyacheck
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_URL: jdbc:postgresql://localhost:5432/afyacheck
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      # CI-only dummy value — spring.mail.password has no default and is
      # required for the app to start (see application.properties).
      MAIL_PASSWORD: ci-test-mail-password
      # CI-only dummy value — keycloak.admin.client-secret has no default and is
      # required for the app to start (see application.properties).
      KEYCLOAK_BACKEND_CLIENT_SECRET: ci-test-keycloak-client-secret

    steps:
      - uses: actions/checkout@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build and test
        run: ./gradlew build

      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-report
          path: build/reports/tests/test

  python-services:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        service: [ml-service, python-service]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: ${{ matrix.service }}/requirements.txt

      - name: Install dependencies
        run: pip install -r ${{ matrix.service }}/requirements.txt

      - name: Audit dependencies for known CVEs
        run: |
          pip install pip-audit
          pip-audit -r ${{ matrix.service }}/requirements.txt

      # No pytest suite exists yet for these services — this is a best-effort
      # syntax/import sanity check. Replace with `pytest` once tests are added.
      - name: Sanity-check ml-service entrypoint
        if: matrix.service == 'ml-service'
        run: python -m py_compile ml-service/app.py

      - name: Sanity-check python-service entrypoint
        if: matrix.service == 'python-service'
        run: python -m py_compile python-service/decision_tree_service.py

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Build (includes landing page prerender)
        run: npm run build

      - name: Check bundle budget
        run: npm run budget:check

      - name: Upload frontend build
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist
